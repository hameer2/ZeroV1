name: ZeroV1 Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows (64-bit)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW compiler
        run: |
          source ./util/ci/common.sh
          install_mingw_deps 64 true
          sudo ./util/buildbot/download_toolchain.sh /usr

      - name: Build
        run: |
          EXISTING_MINETEST_DIR=$PWD ./util/buildbot/buildwin64.sh B
          mkdir -p artifact
          cp -v B/build/*.zip artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZeroV1-windows-64bit
          path: artifact/*.zip
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ZeroV1 Latest Build
          files: artifact/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
